# ── Swagger / SpringDoc 설정 ──────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html               # Swagger UI 접속 경로
    operations-sorter: method            # HTTP 메서드 기준 정렬
    tags-sorter: alpha                   # 태그 알파벳 정렬
    display-request-duration: true       # 요청 처리 시간 표시
    groups-order: asc
    disable-swagger-default-url: true
    try-it-out-enabled: true             # Try it out 기본 활성화
    persist-authorization: true          # 페이지 새로고침 후에도 토큰 유지
  api-docs:
    path: /v3/api-docs                   # OpenAPI JSON 경로
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  show-actuator: false

